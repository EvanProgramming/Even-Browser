<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Even Browser</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="animations.css">
</head>
<body>
  <!-- SVG Noise Filter -->
  <svg width="0" height="0" style="position: absolute;">
    <filter id="liquid-glass-noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" result="noise" />
      <feBlend in="SourceGraphic" in2="noise" mode="soft-light" />
    </filter>
  </svg>

  <!-- Top Toolbar -->
  <div class="toolbar">
    <div class="traffic-light-placeholder"></div>
    <div class="nav-buttons">
      <button id="back-btn" class="nav-btn">←</button>
      <button id="forward-btn" class="nav-btn">→</button>
    </div>
    <div class="address-bar-container">
      <div class="address-bar liquid-glass">
        <div class="security-icon">🔒</div>
        <input type="text" id="address-input" class="address-input" placeholder="搜索或输入网址">
        <button id="reload-btn" class="reload-btn">⟳</button>
        <div class="loading-bar"></div>
      </div>
    </div>
    <div class="toolbar-buttons">
      <button id="share-btn" class="toolbar-btn">📤</button>
      <button id="tabs-btn" class="toolbar-btn">⊞</button>
    </div>
  </div>

  <!-- Tab Bar -->
  <div class="tab-bar">
    <div class="tabs-container" id="tabs-container">
      <!-- Tabs will be dynamically added here -->
    </div>
    <button id="new-tab-btn" class="new-tab-btn">+</button>
  </div>

  <script src="browser.js"></script>
</body>
</html>
