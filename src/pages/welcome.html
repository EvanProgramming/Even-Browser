<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>欢迎使用 Even Browser</title>
  <link rel="stylesheet" href="../ui/styles.css">
  <link rel="stylesheet" href="../ui/animations.css">
  <style>
    .welcome-container {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px;
      background: transparent;
    }

    .welcome-header {
      text-align: center;
      margin-bottom: 40px;
      animation: window-fade-in var(--duration-slower) var(--ease-out-apple);
    }

    .welcome-title {
      font-size: 32px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .welcome-subtitle {
      font-size: 16px;
      color: var(--text-secondary);
    }

    .extensions-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      max-width: 800px;
      width: 100%;
      margin-bottom: 40px;
      animation: window-fade-in var(--duration-slower) var(--ease-out-apple) 0.2s both;
    }

    .extension-card {
      padding: 20px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--bg-secondary);
      backdrop-filter: saturate(180%) blur(20px);
      transition: all var(--duration-fast) var(--ease-out-apple);
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }

    .extension-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(90deg, 
        rgba(255, 0, 0, 0.02) 0%, 
        rgba(0, 255, 255, 0.02) 100%);
      mix-blend-mode: screen;
      transform: translateX(-0.5px);
      pointer-events: none;
    }

    .extension-card::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: radial-gradient(circle at var(--mouse-x, 50%) var(--mouse-y, 50%), 
        rgba(255, 255, 255, 0.1) 0%, 
        transparent 50%);
      opacity: 0;
      transition: opacity var(--duration-fast) var(--ease-out-apple);
      pointer-events: none;
    }

    .extension-card:hover {
      transform: translateY(-8px) scale(1.02);
      box-shadow: var(--shadow-strong);
    }

    .extension-card:hover::after {
      opacity: 1;
    }

    .extension-card {
      filter: url(#liquid-glass-noise);
    }

    .extension-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .extension-icon {
      width: 48px;
      height: 48px;
      border-radius: 8px;
      background: var(--bg-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }

    .extension-info h3 {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 4px;
    }

    .extension-info p {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.4;
    }

    .extension-actions {
      margin-top: 16px;
      display: flex;
      justify-content: flex-end;
    }

    .install-btn {
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      background: var(--accent-blue);
      color: white;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all var(--duration-fast) var(--ease-out-apple);
    }

    .install-btn:hover {
      background: #0056b3;
      transform: scale(1.05);
    }

    .install-btn:active {
      transform: scale(0.95);
    }

    .welcome-footer {
      display: flex;
      gap: 16px;
      animation: window-fade-in var(--duration-slower) var(--ease-out-apple) 0.4s both;
    }

    .footer-btn {
      padding: 10px 20px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg-secondary);
      backdrop-filter: saturate(180%) blur(20px);
      color: var(--text-primary);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all var(--duration-fast) var(--ease-out-apple);
    }

    .footer-btn:hover {
      background: var(--bg-primary);
      transform: scale(1.05);
    }

    .footer-btn.primary {
      background: var(--accent-blue);
      color: white;
      border-color: var(--accent-blue);
    }

    .footer-btn.primary:hover {
      background: #0056b3;
    }
  </style>
</head>
<body>
  <!-- SVG Noise Filter -->
  <svg width="0" height="0" style="position: absolute;">
    <filter id="liquid-glass-noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" result="noise" />
      <feBlend in="SourceGraphic" in2="noise" mode="soft-light" />
    </filter>
  </svg>

  <div class="welcome-container">
    <div class="welcome-header">
      <h1 class="welcome-title">🎉 欢迎使用 Even Browser</h1>
      <p class="welcome-subtitle">推荐安装以下扩展，提升浏览体验</p>
    </div>

    <div class="extensions-grid">
      <!-- Bitwarden -->
      <div class="extension-card" data-extension-id="nngceckbapebfimnlniiiahkandclblb">
        <div class="extension-header">
          <div class="extension-icon">🔐</div>
          <div class="extension-info">
            <h3>Bitwarden</h3>
            <p>安全的密码管理器，自动填充登录信息</p>
          </div>
        </div>
        <div class="extension-actions">
          <button class="install-btn">安装</button>
        </div>
      </div>

      <!-- uBlock Origin -->
      <div class="extension-card" data-extension-id="cjpalhdlnbpafiamejdnhcphjbkeiagm">
        <div class="extension-header">
          <div class="extension-icon">🛡️</div>
          <div class="extension-info">
            <h3>uBlock Origin</h3>
            <p>高效的广告拦截器，保护隐私</p>
          </div>
        </div>
        <div class="extension-actions">
          <button class="install-btn">安装</button>
        </div>
      </div>

      <!-- Dark Reader -->
      <div class="extension-card" data-extension-id="eimadpbcbfnmbkopoojfekhnkhdbieeh">
        <div class="extension-header">
          <div class="extension-icon">🌙</div>
          <div class="extension-info">
            <h3>Dark Reader</h3>
            <p>为所有网站启用暗色模式</p>
          </div>
        </div>
        <div class="extension-actions">
          <button class="install-btn">安装</button>
        </div>
      </div>

      <!-- Privacy Badger -->
      <div class="extension-card" data-extension-id="pkehgijcmpdhfbdbbnkijodmdjhbjlgp">
        <div class="extension-header">
          <div class="extension-icon">🔒</div>
          <div class="extension-info">
            <h3>Privacy Badger</h3>
            <p>自动阻止跟踪器，保护隐私</p>
          </div>
        </div>
        <div class="extension-actions">
          <button class="install-btn">安装</button>
        </div>
      </div>
    </div>

    <div class="welcome-footer">
      <button class="footer-btn" id="skip-btn">跳过</button>
      <button class="footer-btn primary" id="done-btn">完成</button>
    </div>
  </div>

  <script>
    // Liquid glass mouse tracking
    const cards = document.querySelectorAll('.extension-card');
    cards.forEach(card => {
      card.addEventListener('mousemove', (e) => {
        const rect = card.getBoundingClientRect();
        const x = ((e.clientX - rect.left) / rect.width) * 100;
        const y = ((e.clientY - rect.top) / rect.height) * 100;
        card.style.setProperty('--mouse-x', `${x}%`);
        card.style.setProperty('--mouse-y', `${y}%`);
      });
    });

    // Install buttons
    const installBtns = document.querySelectorAll('.install-btn');
    installBtns.forEach(btn => {
      btn.addEventListener('click', (e) => {
        const card = e.target.closest('.extension-card');
        const extensionId = card.dataset.extensionId;
        console.log(`Installing extension: ${extensionId}`);
        // TODO: Implement extension installation
        btn.textContent = '已安装';
        btn.disabled = true;
        btn.style.background = '#28a745';
      });
    });

    // Footer buttons
    document.getElementById('skip-btn').addEventListener('click', () => {
      window.location.href = '../ui/index.html';
    });

    document.getElementById('done-btn').addEventListener('click', () => {
      window.location.href = '../ui/index.html';
    });
  </script>
</body>
</html>
